<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FARS v2 — 全自动研究系统</title>
  <link rel="stylesheet" href="css/v2-dashboard.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
</head>
<body>

<!-- ======================== TOP BAR ======================== -->
<header class="topbar">
  <div class="topbar-brand">
    <span class="brand-icon">🔬</span>
    <span class="brand-name">FARS v2</span>
    <span class="brand-sub">全自动研究系统</span>
  </div>
  <div class="topbar-center">
    <div class="pipeline-mini" id="pipelineMini"><!-- injected by pipeline-view.js --></div>
  </div>
  <div class="topbar-actions">
    <button class="btn-icon" id="btnSettings" title="LLM 配置">⚙️</button>
    <button class="btn-icon" id="btnRefresh" title="刷新状态">🔄</button>
    <span class="status-dot" id="statusDot" title="系统状态"></span>
  </div>
</header>

<!-- ======================== MAIN LAYOUT ======================== -->
<div class="main-layout">

  <!-- ===== LEFT SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <h3 class="sidebar-title">📊 研究概览</h3>
      <div class="stats-cards" id="statsCards"><!-- injected by research-sidebar.js --></div>
    </div>

    <div class="sidebar-section">
      <h3 class="sidebar-title">🔬 假设列表</h3>
      <div class="hypothesis-list" id="hypothesisList">
        <div class="empty-state">暂无假设</div>
      </div>
    </div>

    <div class="sidebar-section">
      <h3 class="sidebar-title">📁 论文列表</h3>
      <div class="paper-list" id="paperList">
        <div class="empty-state">暂无论文</div>
      </div>
      <button class="btn-sm btn-outline" id="btnNewPaper">+ 新建论文</button>
    </div>

    <div class="sidebar-section">
      <h3 class="sidebar-title">🔀 分支</h3>
      <div class="branch-list" id="branchList"><!-- injected dynamically --></div>
      <button class="btn-sm btn-outline" id="btnNewBranch">+ 新建分支</button>
    </div>
  </aside>

  <!-- ===== CENTER CONTENT ===== -->
  <main class="content" id="mainContent">

    <!-- --- Tab Navigation --- -->
    <div class="tabs">
      <button class="tab active" data-tab="pipeline">📍 流水线</button>
      <button class="tab" data-tab="experiments">🔬 实验</button>
      <button class="tab" data-tab="quality">✅ 质量</button>
      <button class="tab" data-tab="topology">🕸️ 拓扑图</button>
      <button class="tab" data-tab="compare">📊 对比</button>
    </div>

    <!-- Tab Panels -->
    <div class="tab-panel active" id="panel-pipeline">
      <div class="pipeline-view" id="pipelineView"><!-- injected by pipeline-view.js --></div>
      <div class="pipeline-controls">
        <button class="btn btn-primary" id="btnStartResearch">🚀 开始研究</button>
        <button class="btn btn-warning" id="btnPauseResearch">⏸️ 暂停</button>
        <button class="btn btn-danger" id="btnStopResearch">⏹️ 停止</button>
        <button class="btn btn-secondary" id="btnCheckpoint">📍 断点管理</button>
      </div>
      <div class="activity-log" id="activityLog">
        <div class="empty-state">等待开始...</div>
      </div>
    </div>

    <div class="tab-panel" id="panel-experiments">
      <div class="experiment-panel" id="experimentPanel"><!-- injected by experiment-panel.js --></div>
    </div>

    <div class="tab-panel" id="panel-quality">
      <div class="quality-panel" id="qualityPanel"><!-- injected by quality-panel.js --></div>
    </div>

    <div class="tab-panel" id="panel-topology">
      <div class="topology-container" id="topologyContainer">
        <div class="topology-placeholder">拓扑图加载中...</div>
      </div>
    </div>

    <div class="tab-panel" id="panel-compare">
      <div class="paper-compare" id="paperCompare"><!-- injected by paper-compare.js --></div>
    </div>

  </main>
</div>

<!-- ======================== MODALS ======================== -->

<!-- Settings Modal -->
<div class="modal" id="modalSettings" hidden>
  <div class="modal-content">
    <div class="modal-header">
      <h2>⚙️ LLM 配置</h2>
      <button class="btn-close" data-modal="modalSettings">✕</button>
    </div>
    <div class="modal-body" id="settingsBody"><!-- injected dynamically --></div>
  </div>
</div>

<!-- Checkpoint Modal -->
<div class="modal" id="modalCheckpoint" hidden>
  <div class="modal-content modal-lg">
    <div class="modal-header">
      <h2>📍 断点管理</h2>
      <button class="btn-close" data-modal="modalCheckpoint">✕</button>
    </div>
    <div class="modal-body" id="checkpointBody"><!-- injected by checkpoint-manager.js --></div>
  </div>
</div>

<!-- New Branch Modal -->
<div class="modal" id="modalNewBranch" hidden>
  <div class="modal-content">
    <div class="modal-header">
      <h2>🔀 新建分支</h2>
      <button class="btn-close" data-modal="modalNewBranch">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>分支名称</label>
        <input type="text" id="inputBranchName" placeholder="例如：AlphaPortfolio分支" />
      </div>
      <div class="form-group">
        <label>综述内容（可选）</label>
        <textarea id="inputBranchReview" rows="6" placeholder="粘贴文献综述内容，作为分支研究背景..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-modal="modalNewBranch">取消</button>
      <button class="btn btn-primary" id="btnConfirmNewBranch">创建分支</button>
    </div>
  </div>
</div>

<!-- New Paper Modal -->
<div class="modal" id="modalNewPaper" hidden>
  <div class="modal-content">
    <div class="modal-header">
      <h2>📝 新建论文</h2>
      <button class="btn-close" data-modal="modalNewPaper">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>研究主题</label>
        <input type="text" id="inputPaperTopic" placeholder="例如：基于Transformer的量化选股策略" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-modal="modalNewPaper">取消</button>
      <button class="btn btn-primary" id="btnConfirmNewPaper">生成论文</button>
    </div>
  </div>
</div>

<!-- ======================== TOAST ======================== -->
<div class="toast-container" id="toastContainer"></div>

<!-- ======================== SCRIPTS ======================== -->
<script src="api/client.js"></script>
<script src="state/store.js"></script>
<script src="components/pipeline-view.js"></script>
<script src="components/research-sidebar.js"></script>
<script src="components/topology-graph.js"></script>
<script src="components/experiment-panel.js"></script>
<script src="components/quality-panel.js"></script>
<script src="components/paper-compare.js"></script>
<script src="components/checkpoint-manager.js"></script>

<script>
/* =========================================================
   FARS v2 — Main Entry Point
   ========================================================= */

(function () {
  'use strict';

  // ── Tab Navigation ──────────────────────────────────────
  const TAB_RENDERS = {
    pipeline: function() {
      if (window.FARSV2Render) {
        window.FARSV2Render.pipeline();
        window.FARSV2Render.activity();
        window.FARSV2Render.pipelineControls();
      }
    },
    experiments: function() {
      if (window.FARSV2Render && window.FARSV2Render.experimentPanel) {
        window.FARSV2Render.experimentPanel();
      }
    },
    quality: function() {
      if (window.FARSV2Render && window.FARSV2Render.qualityPanel) {
        window.FARSV2Render.qualityPanel();
      }
    },
    topology: function() {
      if (window.FARSV2Render && window.FARSV2Render.topology) {
        window.FARSV2Render.topology();
      }
    },
    compare: function() {
      if (window.FARSV2Render && window.FARSV2Render.compare) {
        window.FARSV2Render.compare();
      }
    },
  };

  document.querySelectorAll('.tab').forEach(function (tab) {
    tab.addEventListener('click', function () {
      document.querySelectorAll('.tab').forEach(function (t) { t.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active'); });
      tab.classList.add('active');
      const panel = document.getElementById('panel-' + tab.dataset.tab);
      if (panel) panel.classList.add('active');
      // Render active tab content
      var render = TAB_RENDERS[tab.dataset.tab];
      if (render) setTimeout(render, 30);
    });
  });

  // ── Modal helpers ──────────────────────────────────────
  window._openModal = function (id) {
    const m = document.getElementById(id);
    if (m) m.removeAttribute('hidden');
  };
  window._closeModal = function (id) {
    const m = document.getElementById(id);
    if (m) m.setAttribute('hidden', '');
  };

  document.querySelectorAll('.btn-close, [data-modal]').forEach(function (el) {
    el.addEventListener('click', function () {
      const id = el.dataset.modal;
      if (id) _closeModal(id);
    });
  });

  // ── Buttons ────────────────────────────────────────────
  document.getElementById('btnSettings').addEventListener('click', function () {
    _openModal('modalSettings');
    if (window.FARSV2 && window.FARSV2.loadSettings) window.FARSV2.loadSettings();
  });

  document.getElementById('btnRefresh').addEventListener('click', function () {
    window.FARSV2.refresh();
  });

  document.getElementById('btnCheckpoint').addEventListener('click', function () {
    _openModal('modalCheckpoint');
    if (window.FARSV2 && window.FARSV2.loadCheckpoints) window.FARSV2.loadCheckpoints();
  });

  document.getElementById('btnNewBranch').addEventListener('click', function () {
    _openModal('modalNewBranch');
  });

  document.getElementById('btnNewPaper').addEventListener('click', function () {
    _openModal('modalNewPaper');
  });

  document.getElementById('btnConfirmNewBranch').addEventListener('click', async function () {
    const name = document.getElementById('inputBranchName').value.trim();
    const review = document.getElementById('inputBranchReview').value.trim();
    if (!name) return FARSV2.toast('请输入分支名称', 'error');
    try {
      await FARSApi.createBranch(name, review);
      _closeModal('modalNewBranch');
      FARSV2.toast('分支创建成功', 'success');
      FARSV2.refresh();
    } catch (e) {
      FARSV2.toast('创建失败: ' + e.message, 'error');
    }
  });

  document.getElementById('btnConfirmNewPaper').addEventListener('click', async function () {
    const topic = document.getElementById('inputPaperTopic').value.trim();
    if (!topic) return FARSV2.toast('请输入研究主题', 'error');
    try {
      await FARSApi.generateNext({ topic: topic });
      _closeModal('modalNewPaper');
      FARSV2.toast('论文生成已启动', 'success');
      FARSV2.refresh();
    } catch (e) {
      FARSV2.toast('生成失败: ' + e.message, 'error');
    }
  });

  // Pipeline control buttons
  document.getElementById('btnStartResearch').addEventListener('click', async function () {
    try {
      await FARSApi.startResearch();
      FARSV2.toast('研究已启动', 'success');
      FARSV2.refresh();
    } catch (e) {
      FARSV2.toast('启动失败: ' + e.message, 'error');
    }
  });

  document.getElementById('btnPauseResearch').addEventListener('click', async function () {
    var state = window.FARSStore.getState();
    try {
      if (state.isPaused) {
        await FARSApi.resumeResearch();
        FARSV2.toast('已恢复', 'success');
      } else {
        await FARSApi.pauseResearch();
        FARSV2.toast('已暂停', 'info');
      }
      FARSV2.refresh();
    } catch (e) {
      FARSV2.toast('操作失败: ' + e.message, 'error');
    }
  });

  document.getElementById('btnStopResearch').addEventListener('click', async function () {
    try {
      await FARSApi.stopResearch();
      FARSV2.toast('已停止', 'info');
      FARSV2.refresh();
    } catch (e) {
      FARSV2.toast('停止失败: ' + e.message, 'error');
    }
  });

  // ── FARSV2 Global Controller ───────────────────────────
  window.FARSV2 = {
    refreshTimer: null,

    async init: function () {
      await this.loadState();
      this.startAutoRefresh(5000);
    },

    async loadState: function () {
      try {
        const state = await FARSApi.getResearchState();
        FARSStore.setState(state);
        this.renderAll();
        this.updateStatusDot(state);
      } catch (e) {
        console.error('[FARSV2] loadState error:', e);
        this.toast('加载状态失败', 'error');
      }
    },

    renderAll: function () {
      if (window.FARSV2Render) {
        if (window.FARSV2Render.sidebar) window.FARSV2Render.sidebar();
        if (window.FARSV2Render.pipeline) window.FARSV2Render.pipeline();
        if (window.FARSV2Render.activity) window.FARSV2Render.activity();
        if (window.FARSV2Render.pipelineControls) window.FARSV2Render.pipelineControls();
      }
    },

    startAutoRefresh: function (intervalMs) {
      if (this.refreshTimer) clearInterval(this.refreshTimer);
      this.refreshTimer = setInterval(function () {
        FARSV2.loadState();
      }, intervalMs);
    },

    refresh: function () {
      this.loadState();
    },

    loadSettings: async function () {
      try {
        const data = await FARSApi.getLLMConfig();
        const body = document.getElementById('settingsBody');
        body.innerHTML = FARSV2.templates.settings(data);
      } catch (e) {
        document.getElementById('settingsBody').innerHTML = '<p class="error">加载失败: ' + e.message + '</p>';
      }
    },

    showPaperDetail: async function (paperId) {
      // Switch to experiments tab and load paper detail
      var tabEl = document.querySelector('.tab[data-tab="experiments"]');
      if (tabEl) tabEl.click();
      // Give tab time to switch, then render experiment panel
      setTimeout(function () {
        if (window.FARSV2Render && window.FARSV2Render.experiment) {
          window.FARSV2Render.experiment(paperId);
        }
      }, 100);
    },

    loadCheckpoints: async function () {
      try {
        const data = await FARSApi.getCheckpoints();
        const body = document.getElementById('checkpointBody');
        body.innerHTML = FARSV2.templates.checkpoints(data);
      } catch (e) {
        document.getElementById('checkpointBody').innerHTML = '<p class="error">加载失败: ' + e.message + '</p>';
      }
    },

    updateStatusDot: function (state) {
      const dot = document.getElementById('statusDot');
      if (!dot) return;
      if (state.is_generating) {
        dot.className = 'status-dot status-green pulse';
        dot.title = '生成中';
      } else if (state.is_paused) {
        dot.className = 'status-dot status-yellow';
        dot.title = '已暂停';
      } else {
        dot.className = 'status-dot status-gray';
        dot.title = '空闲';
      }
    },

    toast: function (msg, type) {
      const c = document.getElementById('toastContainer');
      const el = document.createElement('div');
      el.className = 'toast toast-' + (type || 'info');
      el.textContent = msg;
      c.appendChild(el);
      setTimeout(function () { el.remove(); }, 3500);
    },

    templates: {
      settings: function (data) {
        const p = data.llm || {};
        const providers = Object.keys(data.llm_providers || {});
        return '<div class="settings-form">' +
          '<div class="form-group"><label>Provider</label><select id="s_provider">' +
          providers.map(function (pr) { return '<option value="' + pr + '"' + (pr === p.provider ? ' selected' : '') + '>' + pr + '</option>'; }).join('') +
          '</select></div>' +
          '<div class="form-group"><label>Model</label><input type="text" id="s_model" value="' + (p.model || '') + '" /></div>' +
          '<div class="form-group"><label>Temperature</label><input type="number" id="s_temp" value="' + (p.temperature || 0.7) + '" step="0.1" min="0" max="2" /></div>' +
          '<div class="form-group"><label>Max Tokens</label><input type="number" id="s_maxtokens" value="' + (p.max_tokens || 4096) + '" /></div>' +
          '<div class="form-group"><label>API Key</label><input type="password" id="s_apikey" placeholder="从环境变量读取，不在此填写" disabled /></div>' +
          '<div class="form-actions"><button class="btn btn-primary" id="btnSaveSettings">保存</button></div>' +
          '</div>';
      },
      checkpoints: function (data) {
        if (!data.checkpoints || data.checkpoints.length === 0) {
          return '<div class="empty-state">暂无断点记录</div>';
        }
        var html = '<div class="checkpoint-list">';
        data.checkpoints.forEach(function (cp) {
          var meta = cp.meta || {};
          html += '<div class="checkpoint-item">' +
            '<div class="cp-info">' +
              '<div class="cp-id">' + cp.research_id + '</div>' +
              '<div class="cp-meta">' + (meta.topic || '') + ' · ' + (cp.has_checkpoint ? '✓ 有断点' : '无断点') + '</div>' +
            '</div>' +
            '<button class="btn btn-sm btn-primary cp-resume" data-rid="' + cp.research_id + '">📍 恢复</button>' +
          '</div>';
        });
        html += '</div>';
        return html;
      }
    }
  };

  // ── Boot ───────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', function () {
    FARSV2.init();
  });

})();
</script>

</body>
</html>
