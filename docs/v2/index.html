<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FARS v2 - 全自动科研系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <link rel="stylesheet" href="css/v2-dashboard.css?v=20260622r4">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">FARS <span class="version">v2</span></h1>
                <p class="subtitle">全自动量化研究系统</p>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="btn btn-icon" title="切换主题">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
                <button id="settings-btn" class="btn btn-icon" title="设置">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="nav-tabs">
            <button class="nav-tab active" data-tab="pipeline">📊 流水线</button>
            <button class="nav-tab" data-tab="research">🔬 研究</button>
            <button class="nav-tab" data-tab="topology">🌐 拓扑图</button>
            <button class="nav-tab" data-tab="experiments">⚗️ 实验</button>
            <button class="nav-tab" data-tab="quality">📝 质量</button>
            <button class="nav-tab" data-tab="compare">📊 对比</button>
            <button class="nav-tab" data-tab="checkpoints">📍 断点</button>
            <button class="nav-tab" data-tab="llmMonitor">🤖 LLM监控</button>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Pipeline Tab -->
            <div id="pipeline-tab" class="tab-content active">
                <div id="pipeline-container"></div>
            </div>

            <!-- Research Tab -->
            <div id="research-tab" class="tab-content">
                <div id="research-container"></div>
            </div>

            <!-- Topology Tab -->
            <div id="topology-tab" class="tab-content">
                <div id="topology-container"></div>
            </div>

            <!-- Experiments Tab -->
            <div id="experiments-tab" class="tab-content">
                <div id="experiments-container"></div>
            </div>

            <!-- Quality Tab -->
            <div id="quality-tab" class="tab-content">
                <div id="quality-container"></div>
            </div>

            <!-- Compare Tab -->
            <div id="compare-tab" class="tab-content">
                <div id="compare-container"></div>
            </div>

            <!-- Checkpoints Tab -->
            <div id="checkpoints-tab" class="tab-content">
                <div id="checkpoints-container"></div>
            </div>

            <!-- LLM Monitor Tab -->
            <div id="llmMonitor-tab" class="tab-content">
                <div id="llm-monitor-container"></div>
            </div>
        </main>

        <!-- Toast Container -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Modal -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="modal-title"></h3>
                    <button id="modal-close" class="btn btn-icon">×</button>
                </div>
                <div id="modal-body" class="modal-body"></div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="api/client.js?v=20260622r4"></script>
    <script src="state/store.js?v=20260622r4"></script>
    <script src="components/pipeline-view.js?v=20260622r4"></script>
    <script src="components/research-sidebar.js?v=20260622r4"></script>
    <script src="components/topology-graph.js?v=20260622r4"></script>
    <script src="components/experiment-panel.js?v=20260622r4"></script>
    <script src="components/quality-panel.js?v=20260622r4"></script>
    <script src="components/paper-compare.js?v=20260622r4"></script>
    <script src="components/checkpoint-manager.js?v=20260622r4"></script>
    <script src="components/llm-monitor.js?v=20260622r4"></script>
    <script src="app.js?v=20260622r4"></script>
</body>
</html>
